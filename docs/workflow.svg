    <text x="405.0" y="354.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">Temperature Scaling or Isotonic</text>
  <rect x="665" y="311" width="460" height="54" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="895.0" y="337.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">Threshold tuning</text>
    <text x="895.0" y="354.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">Youden-J per label</text>
