  <rect x="627" y="436" width="210" height="50" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="732.0" y="460.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F172A">DenseNet-121</text>
    <text x="732.0" y="476.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F172A">load weights</text>
  <line x1="837" y1="461" x2="853" y2="461" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="853" y="436" width="210" height="50" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1.5"/>
    <text x="958.0" y="460.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F172A">Calibrate</text>
    <text x="958.0" y="476.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F172A">apply saved T</text>
  <line x1="1063" y1="461" x2="1079" y2="461" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="1079" y="436" width="210" height="50" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1.5"/>
    <text x="1184.0" y="460.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F172A">Decide</text>
    <text x="1184.0" y="476.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#0F172A">3-tier output</text>
  <rect x="175" y="514" width="280" height="50" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="315.0" y="538.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A" font-weight="600">POSITIVE</text>
    <text x="315.0" y="555.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A" font-weight="600">above threshold</text>
  <rect x="479" y="514" width="280" height="50" rx="8" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.5"/>
    <text x="619.0" y="538.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A" font-weight="600">UNCERTAIN</text>
    <text x="619.0" y="555.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A" font-weight="600">equivocal band</text>
  <rect x="783" y="514" width="280" height="50" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="923.0" y="538.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A" font-weight="600">NEGATIVE</text>
    <text x="923.0" y="555.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A" font-weight="600">below band</text>
  <rect x="40" y="645" width="1200" height="108" fill="#F8FAFC" stroke="#E2E8F0" rx="6"/><text x="56" y="669" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#64748B">4 · WEB APP & EXPLAINABILITY</text>
  <rect x="175" y="681" width="340" height="54" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
    <text x="345.0" y="707.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">Grad-CAM heatmap</text>
    <text x="345.0" y="724.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">visual explanation</text>
  <rect x="535" y="681" width="530" height="54" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
    <text x="800.0" y="707.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">Web app — FastAPI + React</text>
    <text x="800.0" y="724.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">upload · predict · display results</text>
  <line x1="515" y1="708" x2="535" y2="708" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="6,4"/>
  <rect x="40" y="770" width="1200" height="88" fill="#FAFAFA" stroke="#E2E8F0" rx="6"/>
  <text x="56" y="792" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748B">Purple = model core   ·   Green = web product   ·   Yellow = Grad-CAM explainability</text>
  <text x="56" y="814" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748B">Calibration and thresholds are fit on the validation set only.</text>
  <text x="56" y="836" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#64748B">Research and educational use — physician review required before clinical decisions.</text>
  </svg>