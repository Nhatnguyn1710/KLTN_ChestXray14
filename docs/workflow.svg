    <text x="643.0" y="239.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">sigmoid output</text>
  <line x1="793" y1="223.0" x2="811" y2="223.0" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="811" y="198" width="300" height="50" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1.5"/>
