  <text x="640.0" y="264" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#7C3AED">validation logits</text>
  <rect x="40" y="275" width="1200" height="108" fill="#F8FAFC" stroke="#E2E8F0" rx="6"/><text x="56" y="299" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#64748B">2 · CALIBRATION (VALIDATION SET)</text>
  <rect x="175" y="311" width="460" height="54" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
