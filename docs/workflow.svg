  <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
  </marker>
  </defs>
  <rect width="1280" height="880" fill="#FFFFFF"/>
  <text x="640.0" y="40" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#0F172A">Chest X-Ray Multi-Label Diagnosis — System Workflow</text>
  <text x="640.0" y="64" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#64748B">Training  →  Calibration  →  Inference  →  Web Deployment</text>
  <text x="640.0" y="82" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-style="italic" fill="#94A3B8">Clinical decision support — not a substitute for physicians</text>
  <rect x="40" y="100" width="1200" height="150" fill="#F8FAFC" stroke="#E2E8F0" rx="6"/><text x="56" y="124" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#64748B">1 · MODEL TRAINING</text>
  <rect x="175" y="136" width="300" height="50" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1.5"/>
    <text x="325.0" y="160.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">NIH ChestX-ray14</text>
    <text x="325.0" y="177.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">train / val / test</text>
  <line x1="475" y1="161.0" x2="493" y2="161.0" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="493" y="136" width="300" height="50" rx="8" fill="#FFFFFF" stroke="#64748B" stroke-width="1.5"/>
