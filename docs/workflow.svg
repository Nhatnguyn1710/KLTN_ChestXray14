    <text x="643.0" y="177.5" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#0F172A">CLAHE · resize 448</text>
  <line x1="793" y1="161.0" x2="811" y2="161.0" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
