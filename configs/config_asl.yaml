# NIH ChestX-ray14 — Asymmetric Loss (ASL) training profile
# Chạy: python src/cnn/train.py --config configs/config_asl.yaml
# (hoặc train_asl.bat)
#
# ASL: Ben-Baruch et al. — class weights từ tập train + gamma_neg (mặc định 4) + clip margin.
# Giữ weighted_sampler: false tránh “double rebalancing” (train.py cảnh báo nếu bật cả hai).

paths:
  dataset_dir:   "D:/archive"
  train_csv:     "D:/archive/splits/train.csv"
  val_csv:       "D:/archive/splits/val.csv"
  test_csv:      "D:/archive/splits/test.csv"
  images_dir:    "D:/archive"
  # Sau khi train xong v1, trỏ API/calib sang đây:
  densenet_checkpoint: "./models/nih_densenet121_asl/v1/best_model.pth"
  checkpoint_base_dir: "./models/nih_densenet121_asl"
  gradcam_output_dir:  "./outputs_nih_asl/gradcam"

labels:
  - "Atelectasis"
  - "Cardiomegaly"
  - "Consolidation"
  - "Edema"
  - "Effusion"
  - "Emphysema"
  - "Fibrosis"
  - "Hernia"
  - "Infiltration"
  - "Mass"
  - "Nodule"
  - "Pleural_Thickening"
  - "Pneumonia"
  - "Pneumothorax"

labels_vi:
  Atelectasis:        "Xep phoi"
  Cardiomegaly:       "Tim to"
  Consolidation:      "Dong dac phoi"
  Edema:              "Phu phoi"
  Effusion:           "Tran dich mang phoi"
  Emphysema:          "Khi phe thung"
  Fibrosis:           "Xo phoi"
  Hernia:             "Thoat vi hoanh"
  Infiltration:       "Tham nhiem phoi"
  Mass:               "Khoi u phoi"
  Nodule:             "Not phoi"
  Pleural_Thickening: "Day mang phoi"
  Pneumonia:          "Viem phoi"
  Pneumothorax:       "Tran khi mang phoi"

cnn:
  model_name: "densenet121"
  pretrained: true
  xrv_pretrained: null
  num_classes: 14
  image_size: 448
  dropout: 0.3
  head_norm: "layernorm"
  use_view_position: true
  use_pcam: false
  use_lse: true
  use_lung_mask: false

  normalization:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

  training:
    batch_size: 4
    num_workers: 4
    learning_rate: 0.0003
    backbone_lr_ratio: 0.1
    weight_decay: 0.0001
    num_epochs: 30
    early_stopping_patience: 5
    early_stopping_monitor: "val_macro_auc"
    freeze_backbone_epochs: 5
    use_fp16: true
    gradient_accumulation_steps: 16
    max_grad_norm: 1.0
    finite_check_steps: 1
    class_weight_max: 10.0
    use_ema: true
    ema_decay: 0.999
    topk_checkpoints: 3
    mixup_alpha: 0.0

    loss: "asl"
    weighted_sampler: false       # ASL đã có class_weights — không bật sampler trừ khi biết rõ trade-off
    focal_gamma: 2.0
    fzlpr_tau: 0.2
    class_weight_multiply: 1.0
    optimizer: "adam"
    optimizer_eps: 0.000001
    sgd_momentum: 0.9
    scheduler: "cosine"
    warmup_epochs: 2
    scheduler_patience: 4
    scheduler_factor: 0.5
    scheduler_T0: 6
    scheduler_T_mult: 2
    # ASL (Ben-Baruch style defaults — có thể tinh chỉnh)
    asl_gamma_pos: 0.0
    asl_gamma_neg: 4.0
    asl_clip_margin: 0.05
    # asl_gamma_neg_per_class: {}   # tuỳ chọn: override gamma_neg từng nhãn
    label_smoothing: 0.05          # ASL/BCE: giảm logits quá tự tin (thử 0–0.05)
    use_batch_weight: false
    batch_weight_max: 20.0
    use_swa: false
    model_selection:
      strategy: "mean_auroc"

  augmentation:
    horizontal_flip: true
    random_resized_crop:
      enabled: true
      scale_min: 0.85
      scale_max: 1.0
      ratio_min: 0.95
      ratio_max: 1.05
    shift_scale_rotate:
      enabled: true
      shift_limit: 0.02
      scale_limit: 0.04
      rotate_limit: 3
      prob: 0.3
    brightness_contrast:
      enabled: true
      brightness_limit: 0.2
      contrast_limit: 0.2
      prob: 0.5
    gauss_noise:
      enabled: true
      std_min: 0.008
      std_max: 0.025
      prob: 0.3
    random_gamma:
      enabled: true
      gamma_limit_min: 80
      gamma_limit_max: 120
      prob: 0.3
    clahe_preprocessing:
      enabled: true
      clip_limit: 2.0
      tile_size: 8
    coarse_dropout:
      enabled: true
      min_holes: 4
      max_holes: 10
      hole_height_min: 0.04
      hole_height_max: 0.15
      hole_width_min: 0.04
      hole_width_max: 0.15
      fill_value: 128
      prob: 0.6
    corner_erase:
      enabled: true
      top_ratio: 0.07
      side_ratio: 0.18
      fill_value: 128
      prob: 0.7
    grid_distortion:
      enabled: false
    elastic_transform:
      enabled: false

  evaluation:
    tta_enabled: true
    tta_n_crops: 10
    metrics: ["auroc", "auprc"]
    monitor_metric: "mean_auroc"

  calibration:
    threshold_strategy: "youden_j"
    target_precision: 0.70
    min_threshold: 0.20
    rare_min_threshold: 0.30
    min_pos_for_rare: 30
    max_temperature: 4.0
    min_temperature: 0.8
    min_recall_floor: 0.15
    f_beta_fallback: 1.0
    use_isotonic: true
    per_label_overrides: {}
    equivocal_band: 0.08
    min_tri_gap: 0.02

  tta:
    enabled: true
    scales: [1.0, 0.9, 1.1]
    corner_crops: false
    flip_labels:
      - "Atelectasis"
      - "Cardiomegaly"
      - "Consolidation"
      - "Edema"
      - "Effusion"
      - "Emphysema"
      - "Fibrosis"
      - "Hernia"
      - "Infiltration"
      - "Mass"
      - "Nodule"
      - "Pleural_Thickening"
      - "Pneumonia"
      - "Pneumothorax"

gradcam:
  cam_method: "gradcam"
  target_layers: "features.norm5"
  use_gap_for_gradcam: true
  direct_cam_apply_body_mask: false
  save_raw_cam: false
  colormap: "jet"
  aug_smooth: false
  eigen_smooth: false
  alpha: 0.50
  top_k: 5
  localization_labels:
    - "Atelectasis"
    - "Cardiomegaly"
    - "Effusion"
    - "Infiltration"
    - "Mass"
    - "Nodule"
    - "Pneumonia"
    - "Pneumothorax"
  exclude_labels: []
  pre_upsample_blur_kernel: 3
  smooth_kernel: 7
  percentile_lo: 1.0
  percentile_hi: 99.0
  display_threshold: 0.0
  speckle_filter_enabled: false
  contour_overlay: false
  edge_guided_upsample: false
  apply_body_fade: false
  lung_mask_enabled: false
  text_corner_suppress_top: 0.0
  text_corner_suppress_side: 0.0
  side_strip_suppress_ratio: 0.0
  per_label_overrides: {}

web:
  threshold_floor: 0.15
  backend:
    host: "0.0.0.0"
    port: 8000
    framework: "fastapi"
    max_upload_mb: 10
    cors_allow_credentials: true
    cors_origins:
      - "http://localhost:5000"
      - "http://127.0.0.1:5000"
      - "http://localhost:5173"
      - "http://127.0.0.1:5173"
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
  frontend:
    framework: "react"
    port: 8000
    share: false

general:
  seed: 42
  device: "cuda"
  log_level: "INFO"
  output_dir: "./outputs_nih_asl"
  dataset_mode: "nih"
