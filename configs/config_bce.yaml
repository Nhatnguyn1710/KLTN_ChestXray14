paths:
  dataset_dir:   "D:/archive"
  train_csv:     "D:/archive/splits/train.csv"
  val_csv:       "D:/archive/splits/val.csv"
  test_csv:      "D:/archive/splits/test.csv"
  images_dir:    "D:/archive"
  densenet_checkpoint: "./models/nih_densenet121_bce/v1/best_model.pth"
  checkpoint_base_dir: "./models/nih_densenet121_bce"  # train.py appends /v{N} — must be parent of versioned dirs, not the dir itself
  gradcam_output_dir:  "./outputs_nih_bce/gradcam"

labels:
  - "Atelectasis"
  - "Cardiomegaly"
  - "Consolidation"
  - "Edema"
  - "Effusion"
  - "Emphysema"
  - "Fibrosis"
  - "Hernia"
  - "Infiltration"
  - "Mass"
  - "Nodule"
  - "Pleural_Thickening"
  - "Pneumonia"
  - "Pneumothorax"

labels_vi:
  Atelectasis:        "Xep phoi"
  Cardiomegaly:       "Tim to"
  Consolidation:      "Dong dac phoi"
  Edema:              "Phu phoi"
  Effusion:           "Tran dich mang phoi"
  Emphysema:          "Khi phe thung"
  Fibrosis:           "Xo phoi"
  Hernia:             "Thoat vi hoanh"
  Infiltration:       "Tham nhiem phoi"
  Mass:               "Khoi u phoi"
  Nodule:             "Not phoi"
  Pleural_Thickening: "Day mang phoi"
  Pneumonia:          "Viem phoi"
  Pneumothorax:       "Tran khi mang phoi"

cnn:
  model_name: "densenet121"
  pretrained: true
  xrv_pretrained: null
  num_classes: 14
  image_size: 448
  dropout: 0.3
  head_norm: "layernorm"
  use_view_position: true   # Inject AP/PA as explicit feature — prevents model from learning view-position shortcut
  use_pcam: false
  use_lse: true             # LSE pooling: non-parametric, safer than PCAM for shortcut-prone NIH dataset
  use_lung_mask: false

  normalization:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

  training:
    batch_size: 4
    num_workers: 4
    learning_rate: 0.0002
    backbone_lr_ratio: 0.05
    weight_decay: 0.0001
    num_epochs: 30
    early_stopping_patience: 5
    early_stopping_monitor: "val_macro_auc"
    freeze_backbone_epochs: 5
    use_fp16: false
    gradient_accumulation_steps: 16
    max_grad_norm: 0.5
    finite_check_steps: 1
    class_weight_max: 10.0
    use_ema: true
    ema_decay: 0.999
    topk_checkpoints: 3
    mixup_alpha: 0.0
    
    loss: "bce"
    focal_gamma: 2.0
    fzlpr_tau: 0.2
    class_weight_multiply: 1.0
    optimizer: "adam"
    optimizer_eps: 0.000001
    sgd_momentum: 0.9
    scheduler: "cosine"
    warmup_epochs: 2
    scheduler_patience: 4
    scheduler_factor: 0.5
    scheduler_T0: 6
    scheduler_T_mult: 2
    asl_gamma_pos: 0.0
    asl_gamma_neg: 4.0
    asl_clip_margin: 0.05
    label_smoothing: 0.01          # BCE: tiny smoothing reduces overconfident logits and NaN risk.
    use_swa: false           # Stochastic Weight Averaging (disabled — extra memory, rarely better than EMA)
    model_selection:
      strategy: "mean_auroc"

  augmentation:
    horizontal_flip: true
    random_resized_crop:
      enabled: true
      scale_min: 0.85
      scale_max: 1.0
      ratio_min: 0.95
      ratio_max: 1.05
    shift_scale_rotate:
      enabled: true
      shift_limit: 0.02
      scale_limit: 0.04
      rotate_limit: 3
      prob: 0.3
    brightness_contrast:
      enabled: true
      brightness_limit: 0.2
      contrast_limit: 0.2
      prob: 0.5
    gauss_noise:
      enabled: true
      std_min: 0.008
      std_max: 0.025
      prob: 0.3
    random_gamma:
      enabled: true
      gamma_limit_min: 80       # darkens → phá scanner brightness shortcut
      gamma_limit_max: 120
      prob: 0.3
    clahe_preprocessing:
      enabled: true          # Normalize scanner-specific intensity distributions (reduces domain-shift shortcuts)
      clip_limit: 2.0
      tile_size: 8
    coarse_dropout:
      enabled: true          # Randomly erase patches to discourage corner/artifact shortcuts
      min_holes: 4
      max_holes: 10
      hole_height_min: 0.04
      hole_height_max: 0.15
      hole_width_min: 0.04
      hole_width_max: 0.15
      fill_value: 128        # Mid-gray: maps to ~0 after ImageNet normalization (neutral for X-ray)
      prob: 0.6              # 60% training images — aggressively break spatial memorization
    corner_erase:
      enabled: true          # Deterministically erase top corners where text markers live
      top_ratio: 0.07        # erase top 7% height × side 18% width (each corner)
      side_ratio: 0.18
      fill_value: 128
      prob: 0.7              # 70% chance per image — main fix for text marker shortcut
    grid_distortion:
      enabled: false
    elastic_transform:
      enabled: false

  evaluation:
    tta_enabled: true
    tta_n_crops: 10
    metrics: ["auroc", "auprc"]
    monitor_metric: "mean_auroc"

  calibration:
    # Chiến lược tính ngưỡng: Youden's J statistic
    #   J = Sensitivity + Specificity - 1
    #   Threshold tối ưu = argmax J trên ROC curve.
    # Áp dụng đồng nhất cho tất cả 14 labels — chuẩn paper CheXNet (Rajpurkar 2017),
    # Wang et al. NIH 2017. Không cần per-label override, không cần target tùy ý.
    threshold_strategy: "youden_j"
    target_precision: 0.70                   # Không dùng (giữ để backward-compat)
    min_threshold: 0.20                      # Floor an toàn cho tất cả labels
    rare_min_threshold: 0.30                 # Floor cao hơn cho class hiếm
    min_pos_for_rare: 30                     # Hernia (33 pos) coi như hiếm
    max_temperature: 4.0                     # Cap temperature tránh distortion
    min_temperature: 0.8                     # Floor temperature — T<0.8 phá recall
    min_recall_floor: 0.15                   # Đảm bảo recall tối thiểu
    f_beta_fallback: 1.0                     # F1 (chuẩn) khi cần fallback
    use_isotonic: true                       # Bật isotonic regression khi đủ mẫu dương/âm trên validation
    per_label_overrides: {}                  # Không override — 1 công thức cho tất cả
    equivocal_band: 0.08
    min_tri_gap: 0.02

  tta:
    enabled: true                      # Bật TTA cho calibration + inference (paper-style: +1-2% AUC)
    # Paper-style final evaluation: original + horizontal flip + zoom +/-10%.
    # Keep disabled during training/model selection; enable only for final test reporting.
    scales: [1.0, 0.9, 1.1]
    corner_crops: false
    flip_labels:
      - "Atelectasis"
      - "Cardiomegaly"
      - "Consolidation"
      - "Edema"
      - "Effusion"
      - "Emphysema"
      - "Fibrosis"
      - "Hernia"
      - "Infiltration"
      - "Mass"
      - "Nodule"
      - "Pleural_Thickening"
      - "Pneumonia"
      - "Pneumothorax"

gradcam:
  # ---------------------------------------------------------------------
  # Paper-style preset (Hanif et al., Bioengineering 2025, MDPI):
  # "The feature maps from the conv5 block of our model are used to
  #  generate Grad-CAMs. CXR images are then blended with the respective
  #  Grad-CAMs to visualize these regions, with high-activity areas
  #  displayed in red."
  # = vanilla GradCAM on features.norm5 + applyColorMap + addWeighted blend.
  # NO lung mask, NO corner / strip suppression, NO speckle filter, NO
  # contour overlay, NO aug/eigen smoothing, NO per-label tweaks.
  # The only deviation we keep is the standard anti-aliasing pre-upsample
  # blur (Selvaraju 2017 / pytorch-grad-cam `scale_cam_image`) so the
  # 7x7→input upscale doesn't introduce ringing speckle.
  # ---------------------------------------------------------------------
  cam_method: "gradcam"
  target_layers: "features.norm5"
  use_gap_for_gradcam: true
  direct_cam_apply_body_mask: false
  save_raw_cam: false
  colormap: "jet"
  aug_smooth: false
  eigen_smooth: false
  alpha: 0.50
  top_k: 5
  localization_labels:
    - "Atelectasis"
    - "Cardiomegaly"
    - "Effusion"
    - "Infiltration"
    - "Mass"
    - "Nodule"
    - "Pneumonia"
    - "Pneumothorax"
  exclude_labels: []
  # Standard anti-aliasing low-pass before upsampling 7x7 CAM to image size.
  # Kernel of 3 = minimum effective Gaussian; kills ringing without softening.
  pre_upsample_blur_kernel: 3
  smooth_kernel: 7                 # mild post-blur (paper: only addWeighted)
  percentile_lo: 1.0
  percentile_hi: 99.0
  display_threshold: 0.0           # paper: no thresholding
  speckle_filter_enabled: false
  contour_overlay: false
  edge_guided_upsample: false
  apply_body_fade: false
  lung_mask_enabled: false
  text_corner_suppress_top: 0.0
  text_corner_suppress_side: 0.0
  side_strip_suppress_ratio: 0.0
  per_label_overrides: {}

web:
  threshold_floor: 0.15
  backend:
    host: "0.0.0.0"
    port: 8000
    framework: "fastapi"
    max_upload_mb: 10
    cors_allow_credentials: true
    cors_origins:
      - "http://localhost:5000"
      - "http://127.0.0.1:5000"
      - "http://localhost:5173"
      - "http://127.0.0.1:5173"
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
  frontend:
    framework: "react"
    port: 8000
    share: false

general:
  seed: 42
  device: "cuda"
  log_level: "INFO"
  output_dir: "./outputs_nih_bce"
  dataset_mode: "nih"
