# ============================================================================
# THIẾT LẬP THAM CHIẾU (Reference / Minimal Setup)
# Mục đích: so sánh với Hệ thống đề xuất (config.yaml) để đánh giá
# mức độ cải thiện của các kỹ thuật đã áp dụng.
#
# Khác biệt so với config.yaml (Hệ thống đề xuất):
#   1. use_view_position: false   (không inject AP/PA)
#   2. use_lse: false             (dùng GAP thay LSE pooling)
#   3. clahe_preprocessing: false (không CLAHE)
#   4. coarse_dropout: false      (không CoarseDropout)
#   5. corner_erase: false        (không xóa góc)
#   6. random_gamma: false        (không RandomGamma)
#   7. gauss_noise: false         (không GaussNoise)
#   8. tta_enabled: false         (không Test-Time Augmentation)
#   9. use_isotonic: false        (không Isotonic Regression calibration)
#
# Giữ nguyên (công bằng):
#   - Loss: FZLPR (cùng tau=0.2)
#   - Dataset split: cùng train/val/test CSV
#   - Model backbone: DenseNet-121 ImageNet pretrained
#   - Image size: 448
#   - Batch size, LR, epochs, early stopping, EMA, seed
#   - RandomHorizontalFlip, RandomResizedCrop, ShiftScaleRotate,
#     BrightnessContrast (augmentation cơ bản)
# ============================================================================

paths:
  dataset_dir:   "D:/archive"
  train_csv:     "D:/archive/splits/train.csv"
  val_csv:       "D:/archive/splits/val.csv"
  test_csv:      "D:/archive/splits/test.csv"
  images_dir:    "D:/archive"
  densenet_checkpoint: "./models/nih_densenet121/tham_chieu/best_model.pth"
  checkpoint_base_dir: "./models/nih_densenet121"
  gradcam_output_dir:  "./outputs_nih/gradcam_tham_chieu"

labels:
  - "Atelectasis"
  - "Cardiomegaly"
  - "Consolidation"
  - "Edema"
  - "Effusion"
  - "Emphysema"
  - "Fibrosis"
  - "Hernia"
  - "Infiltration"
  - "Mass"
  - "Nodule"
  - "Pleural_Thickening"
  - "Pneumonia"
  - "Pneumothorax"

labels_vi:
  Atelectasis:        "Xep phoi"
  Cardiomegaly:       "Tim to"
  Consolidation:      "Dong dac phoi"
  Edema:              "Phu phoi"
  Effusion:           "Tran dich mang phoi"
  Emphysema:          "Khi phe thung"
  Fibrosis:           "Xo phoi"
  Hernia:             "Thoat vi hoanh"
  Infiltration:       "Tham nhiem phoi"
  Mass:               "Khoi u phoi"
  Nodule:             "Not phoi"
  Pleural_Thickening: "Day mang phoi"
  Pneumonia:          "Viem phoi"
  Pneumothorax:       "Tran khi mang phoi"

cnn:
  model_name: "densenet121"
  pretrained: true
  xrv_pretrained: null
  num_classes: 14
  image_size: 448
  dropout: 0.3
  head_norm: "layernorm"
  use_view_position: false   # [THAM CHIẾU] Không inject AP/PA → model phải tự phân biệt
  use_pcam: false
  use_lse: false             # [THAM CHIẾU] Dùng Global Average Pooling thay LSE
  use_lung_mask: false

  normalization:
    mean: [0.485, 0.456, 0.406]
    std:  [0.229, 0.224, 0.225]

  training:
    batch_size: 4
    num_workers: 4
    learning_rate: 0.0003
    backbone_lr_ratio: 0.1
    weight_decay: 0.0001
    num_epochs: 30
    early_stopping_patience: 5
    early_stopping_monitor: "val_macro_auc"
    freeze_backbone_epochs: 5
    use_fp16: true
    gradient_accumulation_steps: 16
    max_grad_norm: 1.0
    class_weight_max: 10.0
    use_ema: true
    ema_decay: 0.999
    topk_checkpoints: 3
    mixup_alpha: 0.0

    loss: "fzlpr"
    focal_gamma: 2.0
    fzlpr_tau: 0.2
    class_weight_multiply: 1.0
    optimizer: "adam"
    sgd_momentum: 0.9
    scheduler: "cosine"
    warmup_epochs: 2
    scheduler_patience: 4
    scheduler_factor: 0.5
    scheduler_T0: 6
    scheduler_T_mult: 2
    asl_gamma_pos: 0.0
    asl_gamma_neg: 4.0
    asl_clip_margin: 0.05
    label_smoothing: 0.0
    use_swa: false
    model_selection:
      strategy: "mean_auroc"

  augmentation:
    horizontal_flip: true
    random_resized_crop:
      enabled: true
      scale_min: 0.85
      scale_max: 1.0
      ratio_min: 0.95
      ratio_max: 1.05
    shift_scale_rotate:
      enabled: true
      shift_limit: 0.02
      scale_limit: 0.04
      rotate_limit: 3
      prob: 0.3
    brightness_contrast:
      enabled: true
      brightness_limit: 0.2
      contrast_limit: 0.2
      prob: 0.5
    gauss_noise:
      enabled: false        # [THAM CHIẾU] Tắt
      std_min: 0.008
      std_max: 0.025
      prob: 0.0             # prob=0 → transform không bao giờ áp dụng
    random_gamma:
      enabled: false        # [THAM CHIẾU] Tắt
      gamma_limit_min: 80
      gamma_limit_max: 120
      prob: 0.0
    clahe_preprocessing:
      enabled: false        # [THAM CHIẾU] Tắt CLAHE
      clip_limit: 2.0
      tile_size: 8
    coarse_dropout:
      enabled: false        # [THAM CHIẾU] Tắt CoarseDropout
      min_holes: 4
      max_holes: 10
      hole_height_min: 0.04
      hole_height_max: 0.15
      hole_width_min: 0.04
      hole_width_max: 0.15
      fill_value: 128
      prob: 0.0             # prob=0 → transform không bao giờ áp dụng
    corner_erase:
      enabled: false        # [THAM CHIẾU] Tắt CornerErase
      top_ratio: 0.07
      side_ratio: 0.18
      fill_value: 128
      prob: 0.7
    grid_distortion:
      enabled: false
    elastic_transform:
      enabled: false

  evaluation:
    tta_enabled: false       # [THAM CHIẾU] Tắt TTA
    tta_n_crops: 10
    metrics: ["auroc", "auprc"]
    monitor_metric: "mean_auroc"

  calibration:
    threshold_strategy: "youden_j"
    target_precision: 0.70
    min_threshold: 0.20
    rare_min_threshold: 0.30
    min_pos_for_rare: 30
    max_temperature: 4.0
    min_temperature: 0.8
    min_recall_floor: 0.15
    f_beta_fallback: 1.0
    use_isotonic: false      # [THAM CHIẾU] Chỉ Temperature Scaling, không Isotonic
    per_label_overrides: {}
    equivocal_band: 0.08
    min_tri_gap: 0.02

  tta:
    enabled: false           # [THAM CHIẾU] Tắt TTA
    scales: [1.0, 0.9, 1.1]
    corner_crops: false
    flip_labels:
      - "Atelectasis"
      - "Cardiomegaly"
      - "Consolidation"
      - "Edema"
      - "Effusion"
      - "Emphysema"
      - "Fibrosis"
      - "Hernia"
      - "Infiltration"
      - "Mass"
      - "Nodule"
      - "Pleural_Thickening"
      - "Pneumonia"
      - "Pneumothorax"

gradcam:
  cam_method: "gradcam"
  target_layers: "features.norm5"
  use_gap_for_gradcam: true
  direct_cam_apply_body_mask: false
  save_raw_cam: false
  colormap: "jet"
  aug_smooth: false
  eigen_smooth: false
  alpha: 0.50
  top_k: 5
  localization_labels:
    - "Atelectasis"
    - "Cardiomegaly"
    - "Effusion"
    - "Infiltration"
    - "Mass"
    - "Nodule"
    - "Pneumonia"
    - "Pneumothorax"
  exclude_labels: []
  pre_upsample_blur_kernel: 3
  smooth_kernel: 7
  percentile_lo: 1.0
  percentile_hi: 99.0
  display_threshold: 0.0
  speckle_filter_enabled: false
  contour_overlay: false
  edge_guided_upsample: false
  apply_body_fade: false
  lung_mask_enabled: false
  text_corner_suppress_top: 0.0
  text_corner_suppress_side: 0.0
  side_strip_suppress_ratio: 0.0
  per_label_overrides: {}

web:
  threshold_floor: 0.15
  backend:
    host: "0.0.0.0"
    port: 8000
    framework: "fastapi"
    max_upload_mb: 10
    cors_allow_credentials: true
    cors_origins:
      - "http://localhost:5000"
      - "http://127.0.0.1:5000"
      - "http://localhost:5173"
      - "http://127.0.0.1:5173"
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
  frontend:
    framework: "react"
    port: 8000
    share: false

general:
  seed: 42
  device: "cuda"
  log_level: "INFO"
  output_dir: "./outputs_nih_tham_chieu"
  dataset_mode: "nih"
